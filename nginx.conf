server {
    listen 80;
    server_name call.onfire.so;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api2.onfire.so wss://livekit.onfire.so wss://api2.onfire.so; media-src 'self' blob:; frame-ancestors 'none'" always;

    # Disable caching for HTML, JS, CSS (actively developed)
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        # Re-add security headers (nginx location blocks replace parent add_header)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api2.onfire.so wss://livekit.onfire.so wss://api2.onfire.so; media-src 'self' blob:; frame-ancestors 'none'" always;
        try_files $uri $uri/ /index.html;
    }

    # Well-known files for deep linking
    location /.well-known/apple-app-site-association {
        default_type application/json;
        alias /usr/share/nginx/html/.well-known/apple-app-site-association;
    }

    location /.well-known/assetlinks.json {
        default_type application/json;
        alias /usr/share/nginx/html/.well-known/assetlinks.json;
    }

    # SPA routing - all paths go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
